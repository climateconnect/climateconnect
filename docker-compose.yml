services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.backend_env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv

  celery:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: pdm run celery -A climateconnect_main worker -B -l INFO
    env_file:
      - ./backend/.backend_env
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv

  # Dedicated worker for LocationIQ autocomplete lookups (location.tasks.fetch_autocomplete),
  # isolated on its own queue so it never competes with the rest of the app's Celery
  # workload for concurrency slots.
  #
  # This is ONE container / ONE `celery worker` process — no `replicas:`/`scale:` here,
  # and it must stay that way (see the multi-process bug this design replaced in
  # doc/spec/20260720_1400_locationiq_rate_limited_queue_design.md).
  celery-lookup:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: pdm run celery -A climateconnect_main worker -Q lookup -c 4 -l INFO
    env_file:
      - ./backend/.backend_env
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_PASSWORD: backend
      POSTGRES_USER: backend
      POSTGRES_DB: backend
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  backend-venv:
